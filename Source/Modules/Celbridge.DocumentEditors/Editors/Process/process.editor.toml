[editor]
id = "process"
type = "utility"
entry-point = "index.html"

# A utility editor: each instance declared in the project config is a persistent surface, alive
# until the project unloads, appearing as a rail item beside Explorer and Search. Demonstrates
# the long-running per-project surface pattern.
[utility]
resource-extension = "._process"
template = "templates/default._process"
icon = "cpu"
tooltip = "Utility_Process_Tooltip"
