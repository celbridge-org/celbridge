[document]
id = "process"
type = "custom"
entry_point = "index.html"

# A utility: a persistent surface created when the project loads and alive until it unloads, appearing as a rail
# item beside Explorer and Search. Demonstrates the long-running per-project surface pattern. An example utility,
# behind the example-utilities feature flag.
[utility]
resource   = "utils:settings._process"
template   = "templates/default._process"
icon       = "cpu"
tooltip    = "Utility_Process_Tooltip"
