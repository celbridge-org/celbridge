name: CI

on:
  push:
    branches: ['**']  # Run on all branches
  pull_request:
    branches: [main]  # Run on PRs targeting main

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest  # Linux runner - faster and cross-platform compatible
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Source/Tests/Celbridge.Tests.csproj

      - name: Build tests
        run: dotnet build Source/Tests/Celbridge.Tests.csproj --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Source/Tests/Celbridge.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()  # Run even if tests fail
        with:
          name: Unit Test Results
          path: '**/test-results.trx'
          reporter: dotnet-trx
          fail-on-error: true

  js-test:
    name: Run JS Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./Source
        run: npm install

      - name: Run JS tests
        working-directory: ./Source
        run: npm test

  python-test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install packages with dev dependencies
        working-directory: ./Source/Python
        run: pip install -e "packages/celbridge[dev]"

      - name: Run Python tests
        working-directory: ./Source/Python
        run: python run_tests.py
